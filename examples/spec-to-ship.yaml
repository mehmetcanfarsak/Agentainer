# =============================================================================
# 🚀 spec-to-ship -- the full SPEC → BUILD → TEST → REVIEW → RELEASE-GATE
# pipeline as one hub-and-spoke swarm. Drop a vague product idea in the top; a
# finished, gated, shippable build comes out the bottom.
#
#   cp examples/spec-to-ship.yaml my-product.yaml
#   agentainer up   -c my-product.yaml
#   agentainer send -c my-product.yaml --to shipmaster "Idea: a CLI that turns meeting notes into a calendar"
#   agentainer down -c my-product.yaml
#
# This is DISTINCT from examples/product-spec.yaml (just a spec writer),
# examples/tdd-pingpong.yaml (just red/green), examples/pr-review-gate.yaml
# (just reviewers), examples/software-company.yaml (a standing org). Here the
# SHIPMASTER is the single hub that sequences FIVE stages end-to-end and is the
# ONLY agent that talks to the human; the four specialists only ever report to
# shipmaster, and the RELEASE-GATE is the final authority that ships only when
# spec + tests + review all pass, otherwise bounces it back with reasons.
#
# Shape (hub-and-spoke; the pipeline is sequenced by shipmaster, stage by stage):
#
#            user
#              │  (spec / idea)
#              ▼
#          shipmaster  ◀─────────────────────────────────┐
#          (hub)       │                                   │
#        ┌─────┼─────┬──────────┐                          │
#        ▼     ▼     ▼          ▼                           │
#   spec-   builder tester   reviewer   (all report back)  │
#   writer                                              release-gate
#        │     │     │          │            │            │
#        └─────┴─────┴──────────┴────────────┘            │
#              (shipmaster fans the artifact forward)      │
#              release-gate: APPROVE ──▶ shipmaster ─▶ user│
#                             : BOUNCE  ───────────────────┘
#
# Key-free: commands are the real CLIs (placeholders) — swap for your aliases.
# No API keys are needed to validate the topology; `agentainer validate` proves
# the routing without launching anything.
# =============================================================================

swarm:
  name: spec-to-ship
  root: ./spec-to-ship-workspace

defaults:
  capture: none              # loader auto-upgrades claude/codex to their hook
  can_talk_to: []           # tightened per agent below

agents:
  - name: shipmaster
    type: claude
    can_talk_to: [spec-writer, builder, tester, reviewer, release-gate, user]
    command: "claude --dangerously-skip-permissions"
    # Working-hours nudge so a half-built artifact never stalls mid-pipeline.
    # `when_busy: skip` (default) drops it mid-turn, so it never interrupts an
    # active stage hand-off.
    pings:
      - message: |
          Working-hours check: if a build is mid-pipeline (you've handed work to
          spec-writer / builder / tester / reviewer / release-gate and are
          waiting), note which stage is outstanding and chase it. If nothing is in
          flight, do nothing and wait for the next idea from the user.
        cron: "0 10-17 * * 1-5"       # top of the hour, 10:00-17:59, Mon-Fri
    role: |
      You are SHIPMASTER, the hub and conductor of a spec-to-ship pipeline. You
      are the ONLY agent allowed to talk to the human (user). You receive a vague
      product idea or spec from the user and you sequence the work stage by stage;
      you do NOT write the spec, code, tests, review, or gate decision yourself.
      Run the pipeline IN ORDER:
        1. SPEC: hand the idea to spec-writer. Wait for a tight, testable spec.
        2. BUILD: forward that spec to builder. Wait for an implementation.
        3. TEST: forward the spec + build to tester. Wait for a test report
           (pass/fail) and any fixed code.
        4. REVIEW: forward the spec + build + test report to reviewer. Wait for a
           quality/risk review of the diff.
        5. GATE: forward the spec + build + test report + review to release-gate.
           Wait for its verdict. If it APPROVES, report the shippable result to
           user. If it BOUNCES, forward the reasons back to the responsible stage
           (spec-writer / builder / tester / reviewer as named) and re-run the
           affected stages, then re-submit to release-gate. Repeat until it ships.
      Never skip a stage. Keep the artifact chain intact: each hand-off carries the
      latest spec, code, test result, and review so every stage sees the same
      truth. Always report the final outcome to the user.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: spec-writer, builder, tester, reviewer, release-gate, user.

  - name: spec-writer
    type: codex
    can_talk_to: [shipmaster]
    command: "codex --yolo"
    role: |
      You are SPEC-WRITER, stage 1 of the pipeline. shipmaster hands you a vague
      product idea. Turn it into a tight, testable spec: a one-paragraph goal, a
      numbered list of concrete acceptance criteria (each one checkable by an
      automated test), explicit out-of-scope items, and the risks/assumptions worth
      flagging. Be precise and unambiguous so a builder can implement it without
      asking questions. Do NOT write code. Report the finished spec back to
      shipmaster by writing a file into outbox/shipmaster/, then finish your turn.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: shipmaster.

  - name: builder
    type: claude
    can_talk_to: [shipmaster]
    command: "claude --dangerously-skip-permissions"
    role: |
      You are BUILDER, stage 2 of the pipeline. shipmaster hands you a tight spec
      from spec-writer. Implement it in code that satisfies EVERY acceptance
      criterion in the spec. Keep changes minimal and focused; do not add features
      the spec does not require. Lay out the files you created/changed and a short
      note on how the spec's criteria are met. Do NOT write the test suite (tester
      does that). Report the implementation back to shipmaster by writing a file
      into outbox/shipmaster/ with the code and the summary, then finish your turn.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: shipmaster.

  - name: tester
    type: codex
    can_talk_to: [shipmaster]
    command: "codex --yolo"
    role: |
      You are TESTER, stage 3 of the pipeline. shipmaster hands you the spec and
      the builder's implementation. Write or rig the tests that exercise every
      acceptance criterion in the spec, run them, and report PASS/FAIL per
      criterion with the actual command output. If tests fail, fix the code to make
      them pass and note what you changed — the goal is a green suite that proves
      the spec is met. Do NOT redesign the feature; only what it takes to pass.
      Report the test report + any fixed code back to shipmaster by writing a file
      into outbox/shipmaster/, then finish your turn.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: shipmaster.

  - name: reviewer
    type: gemini
    capture: pane             # gemini detects turns by pane polling
    can_talk_to: [shipmaster]
    command: "gemini --yolo"
    role: |
      You are REVIEWER, stage 4 of the pipeline. shipmaster hands you the spec, the
      builder's implementation, and the tester's report. Review the DIFF for
      quality and risk: correctness against the spec, security/input/data hazards,
      error handling, readability, and missing edge cases. Give a verdict
      (APPROVE / CHANGES-REQUESTED), a severity-ranked list of findings each with
      file:line and a concrete fix, and a one-line risk summary. Do NOT edit the
      code. Report the review back to shipmaster by writing a file into
      outbox/shipmaster/, then finish your turn.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: shipmaster.

  - name: release-gate
    type: claude
    can_talk_to: [shipmaster]
    command: "claude --dangerously-skip-permissions"
    role: |
      You are RELEASE-GATE, stage 5 and the final authority. shipmaster hands you
      the spec, the build, the tester's report, and the reviewer's verdict. You
      APPROVE shipping ONLY when all three conditions hold: (a) the spec is tight
      and testable, (b) every acceptance criterion has a PASSING test, and (c) the
      reviewer's verdict is APPROVE (or all CHANGES-REQUESTED are minor and
      resolved). Otherwise you BOUNCE: name exactly which condition failed and the
      specific reasons (cite the failing test, the open reviewer finding, or the
      weak spec), and say which stage (spec-writer / builder / tester / reviewer)
      must fix it. You are the gate — do not soften a bounce to avoid friction.
      Report your verdict back to shipmaster by writing a file into
      outbox/shipmaster/, then finish your turn.
      MAILBOX: read new mail in inbox/, act, then move it to read/. To reply, write
      a file into outbox/<name>/ (read outbox/<name>/about.md first) and finish your
      turn. You may message: shipmaster.
