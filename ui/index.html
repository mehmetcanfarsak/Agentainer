<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agentainer</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0; padding: 1.5rem; max-width: 980px; margin: 0 auto;
    background: #0f1115; color: #e6e6e6;
  }
  h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  .sub { color: #8b93a1; margin: 0 0 1rem; }
  .card {
    background: #171a21; border: 1px solid #262b36; border-radius: 8px;
    padding: 1rem; margin-bottom: 1rem;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .4rem .5rem; border-bottom: 1px solid #262b36; }
  th { color: #8b93a1; font-weight: 600; }
  .pill { padding: .1rem .45rem; border-radius: 999px; font-size: .75rem; }
  .ok { background: #16351f; color: #7ee29a; }
  .no { background: #3a1d1d; color: #ff9b9b; }
  .busy { background: #3a3416; color: #ffd97a; }
  input, textarea, button, select {
    font: inherit; background: #0f1115; color: #e6e6e6;
    border: 1px solid #2c323f; border-radius: 6px; padding: .45rem .55rem;
  }
  textarea { width: 100%; box-sizing: border-box; min-height: 4rem; resize: vertical; }
  button { cursor: pointer; background: #1f6feb; border-color: #1f6feb; color: #fff; }
  button:hover { background: #2c7dff; }
  .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 0 0 auto; }
  .grow { flex: 1 1 200px !important; }
  pre {
    background: #0f1115; border: 1px solid #262b36; border-radius: 6px;
    padding: .6rem; max-height: 320px; overflow: auto; white-space: pre-wrap;
  }
  .muted { color: #8b93a1; }
  details summary { cursor: pointer; color: #8b93a1; }
  #banner { color: #ff9b9b; min-height: 1.2rem; }
</style>
</head>
<body>
  <h1>Agentainer</h1>
  <p class="sub" id="meta">observability &middot; send as user</p>

  <div class="card" id="login">
    <div class="row">
      <label for="token">Token</label>
      <input id="token" class="grow" type="password" placeholder="paste the UI token" />
      <button id="connect">Connect</button>
    </div>
  </div>

  <div id="app" hidden>
    <div id="banner"></div>

    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <strong>Agents</strong>
        <button id="refresh">Refresh now</button>
      </div>
      <table id="agents">
        <thead>
          <tr>
            <th>Name</th><th>Type</th><th>Running</th><th>State</th>
            <th>Queue</th><th>Unread</th><th>Talks to</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="muted" id="sup"></p>
    </div>

    <div class="card">
      <strong>Send as user</strong>
      <div class="row" style="margin-top:.5rem;">
        <select id="to"></select>
      </div>
      <textarea id="text" placeholder="Message to send from the user mailbox..."></textarea>
      <div class="row" style="margin-top:.5rem; justify-content: space-between;">
        <button id="send">Send</button>
        <span class="muted" id="sendStatus"></span>
      </div>
    </div>

    <div class="card">
      <details>
        <summary>Logs</summary>
        <div class="row" style="margin:.6rem 0;">
          <select id="logAgent"></select>
          <input id="logN" type="number" value="50" min="1" style="width: 5rem;" />
          <button id="loadLogs">Load</button>
          <label><input type="checkbox" id="autoLogs" /> auto (5s)</label>
        </div>
        <pre id="logs">-- no logs loaded --</pre>
      </details>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
