<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="Agentainer banner: zero-dependency multi-agent orchestrator with a file-based mail model">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" rx="14" fill="url(#bg)"/>

  <!-- brand mark: an envelope = the mail model -->
  <g transform="translate(48,60)">
    <rect x="0" y="0" width="100" height="80" rx="12" fill="url(#mark)"/>
    <path d="M10 24 L50 50 L90 24" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 24 L50 50 L90 24" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="10" y1="24" x2="10" y2="62" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
    <line x1="90" y1="24" x2="90" y2="62" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="180" y="100" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="52" font-weight="700" fill="#f8fafc">Agentainer</text>
  <text x="182" y="134" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="19" fill="#94a3b8">Multi-agent orchestrator for AI coding agents</text>

  <!-- feature chips -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" font-weight="600">
    <g transform="translate(182,156)">
      <rect width="118" height="34" rx="17" fill="#0ea5e9" fill-opacity="0.16"/>
      <text x="59" y="22" text-anchor="middle" fill="#7dd3fc">Zero runtime deps</text>
    </g>
    <g transform="translate(312,156)">
      <rect width="120" height="34" rx="17" fill="#22c55e" fill-opacity="0.16"/>
      <text x="60" y="22" text-anchor="middle" fill="#86efac">File-based mail</text>
    </g>
    <g transform="translate(444,156)">
      <rect width="92" height="34" rx="17" fill="#a855f7" fill-opacity="0.16"/>
      <text x="46" y="22" text-anchor="middle" fill="#d8b4fe">tmux + bash</text>
    </g>
    <g transform="translate(548,156)">
      <rect width="150" height="34" rx="17" fill="#f59e0b" fill-opacity="0.16"/>
      <text x="75" y="22" text-anchor="middle" fill="#fcd34d">100% line coverage</text>
    </g>
  </g>
</svg>
